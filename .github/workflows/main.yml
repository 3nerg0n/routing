name: Build Rules
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install v2ray-rules-dat
        run: |
          # Исправленная ссылка (добавлено amd64)
          wget https://github.com/v2fly/v2ray-rules-dat/releases/latest/download/v2ray-rules-dat-linux-amd64.zip
          unzip v2ray-rules-dat-linux-amd64.zip
          chmod +x v2ray-rules-dat

      - name: Prepare directories
        run: |
          # Создаем папки, если их забыли создать вручную
          mkdir -p geosite
          mkdir -p geoip

      - name: Compile DAT files
        run: |
          ./v2ray-rules-dat -type geosite -dir geosite/ -output geosite.dat
          ./v2ray-rules-dat -type geoip -dir geoip/ -output geoip.dat

      - name: Release DAT files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
