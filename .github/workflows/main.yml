name: Build Rules
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Install v2ray-rules-dat
        run: |
          # Устанавливаем универсальный компилятор
          go install github.com/v2fly/v2ray-rules-dat@latest

      - name: Prepare directories
        run: |
          mkdir -p geosite
          mkdir -p geoip

      - name: Build DAT files
        run: |
          # Путь к установленному бинарнику
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # Собираем geosite.dat из папки geosite/
          v2ray-rules-dat -type geosite -dir geosite/ -output geosite.dat
          
          # Собираем geoip.dat из папки geoip/
          v2ray-rules-dat -type geoip -dir geoip/ -output geoip.dat

      - name: Release DAT files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
