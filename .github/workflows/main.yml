name: Build Rules
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Install Compilers
        run: |
          # Устанавливаем компиляторы (исправленные пути)
          go install github.com/v2fly/domain-list-community@latest
          go install github.com/v2fly/geoip@latest

      - name: Prepare directories
        run: |
          # Убеждаемся, что папки существуют
          mkdir -p geosite
          mkdir -p geoip

      - name: Build geosite.dat
        run: |
          # Компиляция доменов
          $(go env GOPATH)/bin/domain-list-community -datapath=geosite/ -outputname=geosite.dat

      - name: Build geoip.dat
        run: |
          # Компиляция IP (теперь используем правильный бинарник geoip)
          $(go env GOPATH)/bin/geoip -i geoip/ -o geoip.dat

      - name: Release DAT files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
