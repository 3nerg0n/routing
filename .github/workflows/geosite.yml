name: Build Geosite
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'data/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Build geosite.dat
        run: |
          # Копируем твои файлы в папку данных сборщика
          cp -rf main/data/* builder/data/
          cd builder
          go run ./ --outputdir=../release

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: release/dlc.dat
          # Мы переименуем dlc.dat в geosite.dat для удобства
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
