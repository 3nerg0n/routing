name: Build Geosite
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'data/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: my_data

      - name: Checkout v2fly builder
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Build geosite.dat
        run: |
          # Очищаем стандартные данные сборщика и копируем твои
          rm -rf builder/data/*
          cp -rf my_data/data/* builder/data/
          cd builder
          go run ./ --outputdir=../release

      - name: Rename and Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: release/dlc.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
