name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Очистка и копирование файлов ПРЯМО В КОРЕНЬ builder
      - name: Prepare IP files
        run: |
          echo "--- Cleaning and moving files ---"
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем \r (Windows), комментарии и пробелы
            # Добавляем /32 только к чистым IPv4 без маски
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "builder/$name"
            echo "File $name: $(wc -l < builder/$name) lines"
          done

      # ШАГ 2: Генерация config.json (пути теперь локальные ./)
      - name: Generate Config
        run: |
          cd builder
          echo '{"input": [' > config.json
          FIRST=true
          # Перебираем файлы, которые мы только что скопировали (исключая системные)
          for f in AdBlock AlfaBank Gos Local Media Ozon RU SberBank Tinkoff Torrent VTB Vk-Mail Wildberries Yandex; do
            if [ -f "$f" ]; then
              if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
              echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$f\", \"uri\": \"./$f\"}}" >> config.json
            fi
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка инструмента и запуск
      - name: Build and Run
        run: |
          cd builder
          go mod download
          go build -o geoip_tool
          
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 700 ]; then echo "ERROR: geoip.dat is still empty!"; exit 1; fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
