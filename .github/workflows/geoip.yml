name: Build GeoIP Hydra Style
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Подготовка файлов (как в оригинале)
      - name: Prepare IP files
        run: |
          mkdir -p builder/input_data
          echo "--- Cleaning and copying files ---"
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем мусор, пустые строки и символы Windows
            # Добавляем /32 только если это чистый IP без маски
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "builder/input_data/$name"
            echo "File $name: $(wc -l < builder/input_data/$name) lines"
          done

      # ШАГ 2: Генерация config.json (строго по формату hydraponique)
      - name: Generate Config
        run: |
          cd builder
          echo '{"input": [' > config.json
          FIRST=true
          for f in input_data/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # ВАЖНО: тип "text", имя тега и относительный путь к файлу
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"./input_data/$name\"}}" >> config.json
          done
          # Вывод в формате v2rayGeoIPDat (как в оригинале)
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка инструмента и запуск
      - name: Build and Run
        run: |
          cd builder
          go mod download
          go build -o geoip_tool
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Проверка результата
          size=$(stat -c%s "output/dat/geoip.dat")
          echo "--- Final size: $size bytes ---"
          
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          
          if [ $size -le 700 ]; then echo "ERROR: geoip.dat is empty!"; exit 1; fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
