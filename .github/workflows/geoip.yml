name: Build GeoIP Final
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем формат IP (добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          mkdir -p cleaned_geoip
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем комментарии, пробелы и пустые строки. 
            # Если в строке только IP (без /) — добавляем /32
            sed -E 's/#[.*]//g; s/[[:space:]]//g; /^[[:space:]]*$/d' "$file" | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "cleaned_geoip/$name"
          done

      # ШАГ 2: Сборка geoip.dat
      - name: Build geoip.dat
        run: |
          cd builder
          # Создаем конфиг специально для этого сборщика
          cat <<EOF > config.json
          {
            "input": [
              {
                "type": "plaintext",
                "action": "add",
                "args": {
                  "uri": "../cleaned_geoip"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputName": "geoip.dat"
                }
              }
            ]
          }
          EOF
          # Запускаем сборку напрямую из исходников
          go run ./ convert -c config.json
          
          # Проверяем результат
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          
          # Выводим размер для проверки
          size=$(stat -c%s "../release/geoip.dat")
          echo "Final size: $size bytes"

      # ШАГ 3: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
