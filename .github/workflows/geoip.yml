name: Build GeoIP Ultimate Fixed
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем IP (добавляем /32 там, где его нет)
      - name: Fix IP format
        run: |
          find main/geoip -type f | while read file; do
            # Удаляем пустые строки и комментарии
            sed -i '/^[[:space:]]*$/d' "$file"
            sed -i '/^#/d' "$file"
            # Добавляем /32 к одиночным IP (где нет слэша)
            sed -i '/^[0-9.]*$/s/$/\/32/' "$file"
          done

      # ШАГ 2: Собираем компилятор и генерируем config.json
      - name: Build and Generate Config
        run: |
          cd builder
          # Собираем сам инструмент
          go build -o geoip_tool
          
          # Генерируем config.json динамически
          echo '{"input": [' > config.json
          
          # Перебираем все файлы в твоей папке geoip
          FILES=$(ls ../main/geoip)
          FIRST=true
          for f in $FILES; do
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # Используем тип plaintext для каждого файла отдельно
            echo "{\"type\": \"plaintext\", \"action\": \"add\", \"args\": {\"name\": \"$f\", \"uri\": \"../main/geoip/$f\"}}" >> config.json
          done
          
          echo '], "output": [{"type": "v2raygeoip", "action": "output", "args": {"uri": "geoip.dat"}}]}' >> config.json
          
          # Запускаем сборку
          ./geoip_tool convert -c config.json
          
          # Подготавливаем результат
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/

      # ШАГ 3: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
