name: Build GeoIP
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**', 'config.json' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: my_data

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      - name: Build geoip.dat
        run: |
          # Переходим в папку сборщика и собираем его
          cd builder
          go build -o geoip_tool
          
          # Копируем твой конфиг и папку с IP внутрь сборщика
          cp ../my_data/config.json .
          cp -r ../my_data/geoip .
          
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Создаем папку для результата и копируем файл
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
