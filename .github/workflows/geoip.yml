name: Build GeoIP Professional
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**', 'config.json' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # Автоматически исправляем формат IP (добавляем /32 к одиночным адресам)
      - name: Fix CIDR and Clean Files
        run: |
          find main/geoip -type f | while read file; do
            sed -i '/^[[:space:]]*$/d' "$file" # Удалить пустые строки
            sed -i '/^#/d' "$file"             # Удалить комментарии
            sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' "$file" # Убрать пробелы
            # Если в строке только IP без слэша - добавить /32
            sed -i -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' "$file"
          done

      - name: Build geoip.dat
        run: |
          cd builder
          # Собираем сам инструмент компиляции
          go build -o geoip_tool
          # Копируем твои данные внутрь сборщика
          cp ../main/config.json .
          cp -r ../main/geoip .
          # Запускаем сборку по твоему конфигу
          ./geoip_tool convert -c config.json
          # Подготавливаем файл для релиза (он будет в папке output/dat/)
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
