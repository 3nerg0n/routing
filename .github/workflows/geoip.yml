name: Build GeoIP Ultimate
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      # ШАГ 1: Исправляем IP-адреса (автоматически добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          find geoip -type f | while read file; do
            # Удаляем пустые строки
            sed -i '/^[[:space:]]*$/d' "$file"
            # Удаляем комментарии (строки с #)
            sed -i '/^#/d' "$file"
            # Удаляем пробелы в начале и конце строк
            sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' "$file"
            # Добавляем /32 к одиночным IPv4 адресам, где нет слэша
            sed -i -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' "$file"
          done

      # ШАГ 2: Скачиваем готовый компилятор (amd64 версия)
      - name: Download v2ray-rules-dat
        run: |
          wget https://github.com/v2fly/v2ray-rules-dat/releases/latest/download/v2ray-rules-dat-linux-amd64.zip
          unzip v2ray-rules-dat-linux-amd64.zip
          chmod +x v2ray-rules-dat

      # ШАГ 3: Собираем geoip.dat (каждый файл в папке станет тегом)
      - name: Build geoip.dat
        run: |
          ./v2ray-rules-dat -type geoip -dir geoip/ -output geoip.dat

      # ШАГ 4: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
