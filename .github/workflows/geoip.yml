name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      - name: Build and Run
        run: |
          # 1. Собираем сам инструмент компиляции
          cd builder
          go build -o geoip_tool
          
          # 2. Готовим папку с данными (копируем твои файлы)
          mkdir -p ../data_input
          cp -rf ../main/geoip/* ../data_input/
          
          # 3. Генерируем config.json с АБСОЛЮТНЫМИ путями
          # Это гарантирует, что сборщик увидит файлы
          DATA_DIR=$(realpath ../data_input)
          
          echo '{"input": [' > config.json
          FIRST=true
          for f in $DATA_DIR/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated Config ---"
          cat config.json
          
          # 4. Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # 5. Проверяем результат
          size=$(stat -c%s "output/dat/geoip.dat")
          echo "--- Final size: $size bytes ---"
          
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          
          # Если файл все еще пустой, принудительно завершаем с ошибкой
          if [ $size -le 700 ]; then echo "ERROR: geoip.dat is empty!"; exit 1; fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
