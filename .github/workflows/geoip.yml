name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Очистка файлов и копирование ВНУТРЬ папки builder
      - name: Clean and Prepare IP files
        run: |
          mkdir -p builder/data_input
          echo "--- Processing files ---"
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем символы Windows (\r), комментарии (#) и лишние пробелы
            # Мы НЕ добавляем /32 принудительно, сборщик сам поймет одиночные IP
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' > "builder/data_input/$name"
            echo "File $name: $(wc -l < builder/data_input/$name) lines"
          done

      # ШАГ 2: Генерация конфига и сборка
      - name: Build geoip.dat
        run: |
          cd builder
          # Собираем сам инструмент
          go build -o geoip_tool
          
          # Генерируем config.json (тип "text" и локальные пути)
          echo '{"input": [' > config.json
          FIRST=true
          for f in data_input/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"./data_input/$name\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"
          if [ $size -le 700 ]; then echo "ERROR: File is still empty!"; exit 1; fi

      # ШАГ 3: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
