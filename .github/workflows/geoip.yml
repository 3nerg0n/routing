name: Build GeoIP GeositeStyle
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      # Клонируем правильный сборщик (как в geosite)
      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем формат IP (добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          mkdir -p cleaned_geoip
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем \r, комментарии, пробелы и пустые строки
            # Добавляем /32 к одиночным IP
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "cleaned_geoip/$name"
            echo "File $name: $(wc -l < cleaned_geoip/$name) IPs"
          done

      # ШАГ 2: Сборка (Генерируем конфиг и запускаем)
      - name: Build geoip.dat
        run: |
          # Заходим в папку сборщика
          cd builder
          
          # Генерируем config.json (используем тип plaintext и абсолютные пути)
          CLEANED_PATH=$(pwd)/../cleaned_geoip
          echo '{"input": [' > config.json
          FIRST=true
          for f in $CLEANED_PATH/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"plaintext\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated Config ---"
          cat config.json

          # Запускаем сборку
          go run ./ convert -c config.json
          
          # Проверяем результат
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"
          if [ $size -le 700 ]; then echo "Error: File is empty"; exit 1; fi

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
