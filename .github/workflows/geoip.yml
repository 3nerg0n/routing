name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Очистка файлов (только самое необходимое)
      - name: Clean IP files
        run: |
          mkdir -p cleaned_geoip
          echo "--- Cleaning files ---"
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем символы Windows (\r) и пустые строки
            tr -d '\r' < "$file" | grep -v '^$' > "cleaned_geoip/$name"
            echo "File $name: $(wc -l < cleaned_geoip/$name) lines"
          done

      # ШАГ 2: Генерация конфига и сборка
      - name: Build geoip.dat
        run: |
          # Получаем абсолютный путь к папке с очищенными IP
          CLEANED_PATH=$(pwd)/cleaned_geoip
          
          # Генерируем config.json
          echo '{"input": [' > config.json
          FIRST=true
          for f in $CLEANED_PATH/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # ВАЖНО: используем тип "plaintext" и полный путь
            echo "{\"type\": \"plaintext\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

          # Сборка инструмента и запуск
          cd builder
          go build -o geoip_tool
          ./geoip_tool convert -c ../config.json
          
          # Проверка результата
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
