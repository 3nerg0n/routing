name: Build GeoIP Professional
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**', 'config.json' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # Автоматически исправляем формат IP (добавляем /32 к одиночным адресам)
      - name: Fix CIDR and Clean Files
        run: |
          find main/geoip -type f | while read file; do
            # Удаляем пустые строки, комментарии и лишние пробелы
            sed -i '/^[[:space:]]*$/d' "$file"
            sed -i '/^#/d' "$file"
            sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' "$file"
            # Добавляем /32 к одиночным IPv4, если нет слэша
            sed -i -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' "$file"
          done

      - name: Build geoip.dat
        run: |
          cd builder
          # Собираем бинарник Loyalsoldier
          go build -o geoip_tool
          # Копируем твои данные внутрь папки сборщика
          cp ../main/config.json .
          cp -r ../main/geoip .
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          # Результат будет в output/dat/geoip.dat
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
