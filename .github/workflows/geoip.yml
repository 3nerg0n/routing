name: Build GeoIP Final
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем формат IP (добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          mkdir -p ./cleaned_geoip
          # Проходим по всем файлам в папке geoip
          find geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем комментарии, пробелы и пустые строки. 
            # Если в строке только IP (без /) — добавляем /32
            sed -E 's/#[.*]//g; s/[[:space:]]//g; /^[[:space:]]*$/d' "$file" | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "./cleaned_geoip/$name"
          done
          echo "Files prepared in cleaned_geoip:"
          ls ./cleaned_geoip

      # ШАГ 2: Устанавливаем компилятор напрямую
      - name: Install GeoIP Tool
        run: |
          go install github.com/v2fly/geoip@latest

      # ШАГ 3: Сборка geoip.dat
      - name: Build geoip.dat
        run: |
          # Создаем конфиг для официального компилятора v2fly
          cat <<EOF > geoip_config.json
          {
            "input": [
              {
                "type": "v2raygeoip",
                "action": "add",
                "args": {
                  "uri": "./cleaned_geoip"
                }
              }
            ],
            "output": [
              {
                "type": "v2raygeoip",
                "action": "output",
                "args": {
                  "uri": "geoip.dat"
                }
              }
            ]
          }
          EOF
          # Запускаем установленный ранее инструмент
          $(go env GOPATH)/bin/geoip -c geoip_config.json
          
          # Проверка размера (должен быть больше 1000 байт)
          size=$(stat -c%s "geoip.dat")
          echo "Final size: $size bytes"

      # ШАГ 4: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
