name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Правильная очистка IP (исправленный sed)
      - name: Clean and Verify IP files
        run: |
          mkdir -p cleaned_geoip
          echo "--- Processing files ---"
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # 1. Убираем символы Windows (\r), комментарии (#) и пробелы
            # 2. Добавляем /32, если в строке только цифры и точки (одиночный IP)
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "cleaned_geoip/$name"
            
            echo "File $name: $(wc -l < cleaned_geoip/$name) valid lines"
          done

      # ШАГ 2: Генерация конфига и сборка
      - name: Build geoip.dat
        run: |
          # Создаем конфиг. ВАЖНО: используем тип "text" для каждого файла
          echo '{"input": [' > config.json
          FIRST=true
          for f in cleaned_geoip/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"../cleaned_geoip/$name\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Config.json content ---"
          cat config.json

          cd builder
          go build -o geoip_tool
          # Запускаем сборку
          ./geoip_tool convert -c ../config.json
          
          # Проверка результата
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"
          if [ $size -le 700 ]; then echo "ERROR: File is empty!"; exit 1; fi

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
