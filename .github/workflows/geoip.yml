name: Build GeoIP GeositeStyle
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      # Клонируем универсальный сборщик (как в geosite)
      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          repository: v2fly/v2ray-rules-dat
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем IP (добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          mkdir -p ./cleaned_geoip
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем \r, комментарии, пробелы и добавляем /32 к одиночным IP
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "./cleaned_geoip/$name"
          done

      # ШАГ 2: Сборка (точно так же, как geosite, но тип geoip)
      - name: Build geoip.dat
        run: |
          cd builder
          # Запускаем сборку напрямую: указываем тип, папку с файлами и имя выхода
          go run ./ -type=geoip -dir=../cleaned_geoip -output=../geoip.dat

      # ШАГ 3: Проверка и Публикация
      - name: Release
        run: |
          size=$(stat -c%s "geoip.dat")
          echo "Final size: $size bytes"
          if [ $size -le 700 ]; then echo "Error: File is empty"; exit 1; fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
