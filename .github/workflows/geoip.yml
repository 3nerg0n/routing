name: Build GeoIP Professional
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем IP (добавляем /32 там, где его нет)
      - name: Fix IP format
        run: |
          find main/geoip -type f | while read file; do
            # Удаляем пустые строки и комментарии
            sed -i '/^[[:space:]]*$/d' "$file"
            sed -i '/^#/d' "$file"
            # Добавляем /32 к одиночным IP
            sed -i -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' "$file"
          done

      # ШАГ 2: Сборка инструмента и генерация файла
      - name: Build geoip.dat
        run: |
          cd builder
          # Компилируем сам сборщик
          go build -o geoip_tool
          
          # Генерируем config.json динамически
          # Используем тип "text", как в примере hydraponique
          echo '{"input": [' > config.json
          FIRST=true
          for f in $(ls ../main/geoip); do
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$f\", \"uri\": \"../main/geoip/$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Копируем результат
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/

      # ШАГ 3: Публикация в Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
