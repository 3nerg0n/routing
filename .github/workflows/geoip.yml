name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Исправляем формат IP (добавляем /32 и чистим мусор)
      - name: Fix IP format
        run: |
          mkdir -p cleaned_geoip
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем комментарии, пробелы и пустые строки. 
            # Если в строке только IP (без /) — добавляем /32
            sed -E 's/#[.*]//g; s/[[:space:]]//g; /^[[:space:]]*$/d' "$file" | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "cleaned_geoip/$name"
          done

      # ШАГ 2: Генерация config.json (по одному файлу, тип "text")
      - name: Generate Config
        run: |
          echo '{"input": [' > config.json
          FIRST=true
          # Перебираем все исправленные файлы
          for f in cleaned_geoip/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # ВАЖНО: используем тип "text" и индивидуальный путь к каждому файлу
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"../cleaned_geoip/$name\"}}" >> config.json
          done
          # Добавляем блок вывода (тип v2rayGeoIPDat как в примере)
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "Generated config.json:"
          cat config.json

      # ШАГ 3: Сборка
      - name: Build geoip.dat
        run: |
          cd builder
          # Собираем сам инструмент
          go build -o geoip_tool
          # Запускаем конвертацию с нашим сгенерированным конфигом
          ./geoip_tool convert -c ../config.json
          
          # Проверяем результат
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          
          # Выводим размер для проверки
          size=$(stat -c%s "../release/geoip.dat")
          echo "Final size: $size bytes"

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
