name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout v2fly geoip builder
        uses: actions/checkout@v4
        with:
          repository: v2fly/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Подготовка файлов (чистка и исправление IP)
      - name: Prepare and Fix IP files
        run: |
          mkdir -p builder/data
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем мусор и добавляем /32 к одиночным IP
            sed -E 's/#[.*]//g; s/[[:space:]]//g; /^[[:space:]]*$/d' "$file" | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "builder/data/$name"
          done
          # Проверка: если папка пуста, создать тестовый файл, чтобы не было ошибки
          [ "$(ls -A builder/data)" ] || echo "1.1.1.1/32" > builder/data/dummy

      # ШАГ 2: Сборка с правильным конфигом
      - name: Build geoip.dat
        run: |
          cd builder
          # Создаем конфиг прямо здесь. Тип v2raygeoip идеально ест папки.
          cat <<EOF > config.json
          {
            "input": [
              {
                "type": "v2raygeoip",
                "action": "add",
                "args": {
                  "uri": "data/"
                }
              }
            ],
            "output": [
              {
                "type": "v2raygeoip",
                "action": "output",
                "args": {
                  "uri": "geoip.dat"
                }
              }
            ]
          }
          EOF
          # Запускаем сборку
          go run ./ -c config.json
          
          # Проверяем размер файла (если меньше 1000 байт - значит ошибка)
          FILE_SIZE=$(stat -c%s "geoip.dat")
          echo "Generated file size: $FILE_SIZE bytes"
          if [ $FILE_SIZE -le 700 ]; then
            echo "Error: geoip.dat is empty!"
            exit 1
          fi
          
          mkdir -p ../release
          cp geoip.dat ../release/

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
